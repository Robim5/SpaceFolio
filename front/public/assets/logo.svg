<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente da esfera -->
    <radialGradient id="sphereGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"></stop>
      <stop offset="70%" stop-color="#0b0b1a"></stop>
      <stop offset="100%" stop-color="#050510"></stop>
    </radialGradient>

    <!-- Glow roxo -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#8a2be2" stop-opacity="0.8"></stop>
      <stop offset="100%" stop-color="#8a2be2" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- Glow exterior -->
  <circle cx="256" cy="256" r="210" fill="url(#glowGradient)" filter="url(#glow)"></circle>

  <!-- Esfera principal -->
  <circle cx="256" cy="256" r="180" fill="url(#sphereGradient)"></circle>
</svg>
